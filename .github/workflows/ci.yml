# =============================================
# TraffiTech — GitHub Actions CI/CD Pipeline
# =============================================
# Triggers: Every push to main & all pull requests
# Jobs: lint → test-frontend → test-backend → build

name: TraffiTech CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────
  # Job 1: Code Linting & Formatting
  # ─────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  # ─────────────────────────────────
  # Job 2: Frontend Tests (Vitest)
  # ─────────────────────────────────
  test-frontend:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────
  # Job 3: Backend Tests (Jest)
  # ─────────────────────────────────
  test-backend:
    name: Backend Tests (Jest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: server

      - name: Run Jest tests
        run: npm test
        working-directory: server
        env:
          NODE_ENV: test

  # ─────────────────────────────────
  # Job 4: Production Build Verify
  # ─────────────────────────────────
  build:
    name: Verify Production Build
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create dummy .env for build
        run: |
          echo "VITE_STRIPE_PUBLISHABLE_KEY=pk_test_dummy_key_for_ci" > .env
          echo "VITE_API_URL=http://localhost:5000" >> .env

      - name: Run Vite production build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3
