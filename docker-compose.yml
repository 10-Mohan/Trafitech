# =============================================
# TraffiTech — Docker Compose
# =============================================
# Usage:
#   docker compose up         → Start all services
#   docker compose up --build → Rebuild and start
#   docker compose down       → Stop all services
#   docker compose logs -f    → Stream logs
# =============================================

version: '3.9'

services:
  # ─────────────────────────────────
  # MongoDB Database
  # ─────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: traffitech-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: traffitech
    networks:
      - traffitech-network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────
  # Node.js Backend API
  # ─────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: traffitech-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./server/.env
    environment:
      MONGODB_URI: mongodb://mongo:27017/traffitech
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - traffitech-network

  # ─────────────────────────────────
  # Vite Frontend (Dev Mode)
  # ─────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: traffitech-frontend
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '5173:5173'
    env_file:
      - ./.env
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    networks:
      - traffitech-network

# ─────────────────────────────────
# Shared Resources
# ─────────────────────────────────
volumes:
  mongo-data:
    driver: local

networks:
  traffitech-network:
    driver: bridge
